<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lottie Preview</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a;
            color: white;
            font-family: sans-serif;
            margin: 0;
            flex-direction: column;
        }

        #lottie-container {
            width: 400px;
            height: 400px;
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        h2 {
            margin-bottom: 5px;
        }

        p {
            color: #aaa;
        }
    </style>
</head>

<body>
    <h2>DuelUp Splash Logo</h2>
    <p>Pulsing Animation Preview</p>

    <div id="lottie-container"></div>

    <script>
        fetch('app/src/main/res/raw/lottie_loading.json')
            .then(response => response.json())
            .then(data => {
                lottie.loadAnimation({
                    container: document.getElementById('lottie-container'),
                    renderer: 'svg',
                    loop: true,
                    autoplay: true,
                    animationData: data
                });
            })
            .catch(err => {
                document.getElementById('lottie-container').innerHTML =
                    "<p style='color:red; text-align:center; padding-top:40%;'>Error loading JSON: " + err + "<br><br>Make sure you are running this via a local server (e.g. <code>python -m http.server</code>) and not just double-clicking the HTML file.</p>";
            });
    </script>
</body>

</html>
